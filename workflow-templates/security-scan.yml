name: Security Scan

on:
  push:
    branches: [$default-branch]
  pull_request:
    branches: [$default-branch]
  schedule:
    - cron: '0 3 * * 1'  # weekly, Monday 03:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only runs on pull requests — compares the base and head to find newly
    # introduced vulnerable or malicious dependencies.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Adjust to match the languages actually used in this repository.
        # Supported values: actions c-cpp csharp go java-kotlin javascript-typescript python ruby swift
        language: [java-kotlin]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
